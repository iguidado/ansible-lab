# webservers.yml
---
- name: Configure web servers
  hosts: web
  become: true

  tasks:
    - name: Install nginx
      apt:
        name: nginx
        state: present
        update_cache: true

    - name: Ensure nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: true

    - name: Deploy index page
      copy:
        content: "<h1>Deployed by Ansible — {{ inventory_hostname }}</h1>"
        dest: /var/www/html/index.html
        mode: '0644'